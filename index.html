<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>河北高考志愿助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;font-size:15px}
.hd{background:linear-gradient(135deg,#0d2137,#1a4a7a);color:#fff;padding:24px;text-align:center}
.hd h1{font-size:22px;font-weight:700}
.bx{max-width:600px;margin:16px;padding:20px;background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.bx label{display:block;font-size:14px;font-weight:600;color:#444;margin-bottom:6px}
.bx input,.bx select{width:100%;padding:12px;border:2px solid #d0d5dd;border-radius:10px;font-size:16px;outline:none}
.bx input:focus,.bx select:focus{border-color:#1a3a5c}
.rw{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.btn{background:linear-gradient(135deg,#1a3a5c,#2a5a8c);color:#fff;border:none;padding:16px;border-radius:10px;font-size:17px;font-weight:600;width:100%;cursor:pointer;box-shadow:0 3px 10px rgba(26,58,92,.35)}
.btn:active{transform:scale(.97)}
#res{display:none;max-width:600px;margin:16px}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.08)}
.card h2{font-size:16px;margin-bottom:12px;color:#1a3a5c}
.gr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.gi{background:#f5f7fa;padding:10px;border-radius:8px;text-align:center}
.gi b{font-size:11px;color:#888;display:block}.gi .v{font-size:17px;font-weight:700;color:#1a3a5c;margin-top:3px}
.sg{background:#f3e5f5;padding:14px;border-radius:8px;font-size:13px;line-height:1.6;border-left:4px solid #9c27b0;margin-bottom:14px}
.ft{text-align:center;padding:20px;font-size:12px;color:#999}
@media(min-width:640px){.bx,.res{margin:20px auto}}
</style></head><body>
<div class=hd><h1>河北高考志愿助手</h1><p>2025河北省教育考试院官方数据</p></div>
<div class=bx><div class=rw>
<div><label>选科</label><select id=subj><option value=p>物理类</option><option value=h>历史类</option></select></div>
<div><label>高考分数</label><input id=sc type=number placeholder="如562" min=0 max=750></div></div>
<button class=btn onclick="go()">开始匹配</button></div>
<div class=res id=res></div>
<div class=ft>数据来源：河北省教育考试院</div>
<script>
var CP=[[459,224230],[460,222850],[470,208299],[480,193088],[490,177231],[500,160507],[502,157169],[510,138000],[520,125000],[530,111000],[532,107712],[540,95459],[550,81112],[560,67726],[562,65166],[570,62000],[580,52000],[590,43000],[600,27073],[610,20009],[620,14098],[630,9436],[640,7000],[650,5000],[660,3500],[670,2500],[680,1800],[690,1200],[700,800]];
function gr(s){for(var i=0;i<CP.length-1;i++){if(s>=CP[i][0]&&s<=CP[i+1][0]){var t=(s-CP[i][0])/(CP[i+1][0]-CP[i][0]);return Math.round(CP[i][1]-t*(CP[i][1]-CP[i+1][1]))}}if(s<=CP[0][0])return CP[0][1];return CP[CP.length-1][1]}
function go(){try{var sc=parseInt(document.getElementById("sc").value);if(!sc||sc<0||sc>750){alert("请输入有效分数");return}
var rk=gr(sc);var re=document.getElementById("res");re.style.display="block";
var ad="";var p=document.getElementById("subj").value=="p";
if(p){if(sc>=620)ad="优秀！建议优先冲学校";else if(sc>=570)ad="良好！建议平衡学校与专业";else if(sc>=480)ad="建议优先保专业";else if(sc>=459)ad="建议选实用性强的工科";else ad="建议选双高专科"}
else{if(sc>=527)ad="建议优先冲学校，文科学校牌子重要";else ad="建议选优质专科"}
re.innerHTML='<div class=card><h2>匹配结果</h2><div class=gr><div class=gi><b>预估分数</b><div class=v>'+sc+'分</div></div><div class=gi><b>预估位次</b><div class=v>'+rk.toLocaleString()+'</div></div><div class=gi><b>'+(p?"物理类":"历史类")+'</b><div class=v style=color:'+(sc>=(p?459:477)?"green":"red")+'>'+(p?"459分本科线":"477分本科线")+'</div></div></div></div>'+(ad?'<div class=sg><b>策略：</b>'+ad+'</div>':'')
}catch(e){alert("错误:"+e.message)}}
</script></body></html>
